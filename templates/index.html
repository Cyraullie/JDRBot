<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <title>🎶 Music Dashboard</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        header {
            background: #1db954;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .left, .right {
            flex: 1;
        }

        .card {
            background: #181818;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .now img {
            width: 100%;
            border-radius: 10px;
        }

        .title {
            font-size: 20px;
            margin-top: 10px;
        }

        .controls button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            background: #1db954;
            color: white;
            cursor: pointer;
        }

        .queue-item {
            display: flex;
            align-items: center;
            background: #222;
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
        }

        .queue-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            margin-right: 10px;
        }

        .queue-info {
            flex: 1;
        }

        .queue-title {
            font-size: 14px;
        }

        .remove {
            background: red;
            border: none;
            color: white;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>🎶 Discord Music Dashboard</header>

<div class="container">

    <!-- NOW PLAYING -->
    <div class="left">
        <div class="card now">
            <h2>Now Playing</h2>
            <img id="thumb" src="">
            <div class="title" id="title">...</div>
        </div>

        <div class="card controls">
            <button onclick="control('pause')">⏸</button>
            <button onclick="control('resume')">▶</button>
            <button onclick="control('skip')">⏭</button>
            <button onclick="control('loop/song')">🔁 Song</button>
            <button onclick="control('loop/queue')">🔁 Queue</button>
        </div>
    </div>

    <!-- QUEUE -->
    <div class="right">
        <div class="card">
            <h2>Queue</h2>
            <div id="queue"></div>
        </div>
    </div>

</div>

<script>
const socket = io();

function formatTime(sec){
    if(!sec) return "0:00";
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return m + ":" + (s < 10 ? "0"+s : s);
}

socket.on("update", data => {
    const now = data.current;
    const queue = data.queue;

    let guild = Object.keys(now)[0];

    if(now[guild]){
        document.getElementById("title").innerText = now[guild].title;
        document.getElementById("thumb").src = now[guild].thumbnail;
    }

    let html = "";
    let q = queue[guild] || [];

    q.forEach((track, i) => {
        html += `
        <div class="queue-item">
            <img src="${track.thumbnail}">
            <div class="queue-info">
                <div class="queue-title">${track.title}</div>
                <div>${formatTime(track.duration)}</div>
            </div>
            <button class="remove" onclick="remove(${i})">❌</button>
        </div>
        `;
    });

    document.getElementById("queue").innerHTML = html;
});

async function control(action){
    await fetch("/"+action, {method:"POST"});
}

async function remove(i){
    await fetch("/queue/remove/"+i, {method:"POST"});
}

</script>

</body>
</html>
